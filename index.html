<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600;700&family=Fraunces:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Noto+Nastaliq+Urdu:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="logo.jsx"></script>

    const { useState } = React;

    const App = () => {
      const [lang, setLang] = useState("en");

      return (
        <>
          <Nav lang={lang} setLang={setLang} current="home" />
          <main>
            <HeroEditorial lang={lang} />
            <TickerSection />
            <ConcernsSection lang={lang} />
            <HowSection lang={lang} />
            <TherapistSection lang={lang} />
            <TrustSection lang={lang} />
            <PrivacySection lang={lang} />
            <DownloadSection lang={lang} />
            <FaqSection lang={lang} />
          </main>
          <Footer lang={lang} />
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

</html>
