<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Pricing · TrueMind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600;700&family=Fraunces:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Noto+Nastaliq+Urdu:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script type="text/babel" src="logo.jsx"></script>
  <script type="text/babel" src="content.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="page-shell.jsx"></script>
  <script type="text/babel" src="home-hero.jsx"></script>
  <script type="text/babel" src="home-sections.jsx"></script>

  <script type="text/babel" data-presets="react">
    const App = () => (
      <Page current="pricing">
        <PageHeader
          eyebrow="Pricing"
          title={<>Affordable, transparent pricing. <span className="accent" style={{fontFamily:"var(--serif)",fontStyle:"italic",color:"var(--terracotta)",fontWeight:400}}>Always.</span></>}
          lede="Therapy should be priced like a service that respects your time and budget — not a luxury. Your first session is free. After that, choose what fits you."
        />

        <section style={{paddingTop:24}}>
          <div className="container">
            <div style={{display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:20}} className="price-grid">
              {[
                {tier:"Single sessions", note:"Pay as you go", desc:"Best when you want to try therapy without commitment, or only need occasional check-ins.", price:"From your first free session", bullets:["First session free","Book one at a time","Switch therapists anytime","No subscription"], cta:"Book free session"},
                {tier:"Monthly care", note:"Most chosen", desc:"Weekly or fortnightly sessions with the same therapist, plus messaging between sessions.", price:"Affordable monthly bundle", bullets:["4 sessions / month","Unlimited in-app messaging","Journal & exercises","Reschedule freely"], cta:"Start monthly", featured:true},
                {tier:"Couples & family", note:"For two or more", desc:"Sessions with a relationship-trained therapist for partners, parents, or families.", price:"Per-session, transparent", bullets:["Both partners join","Specialist matching","Joint and individual notes","Flexible cadence"], cta:"Find a couples therapist"},
              ].map((p,i) => (
                <div key={i} className="card" style={{padding:36, background: p.featured ? "var(--ink)" : "var(--bg-elev)", color: p.featured ? "var(--bg-elev)" : "var(--ink)", border: p.featured ? "none" : "1px solid var(--line-soft)", display:"flex", flexDirection:"column"}}>
                  <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom: 12}}>
                    <span style={{fontSize:13, color: p.featured ? "var(--gold)" : "var(--ink-mute)", fontWeight:500}}>{p.note}</span>
                  </div>
                  <h3 className="h-2" style={{color: p.featured ? "var(--bg-elev)" : "var(--ink)", marginBottom: 12}}>{p.tier}</h3>
                  <p style={{fontSize:14.5, color: p.featured ? "rgba(244,239,230,0.7)" : "var(--ink-soft)", lineHeight:1.55, margin:0}}>{p.desc}</p>
                  <div style={{margin:"28px 0 24px", padding:"16px 0", borderTop: p.featured ? "1px solid rgba(244,239,230,0.15)" : "1px solid var(--line-soft)", borderBottom: p.featured ? "1px solid rgba(244,239,230,0.15)" : "1px solid var(--line-soft)"}}>
                    <div style={{fontFamily:"var(--serif)", fontStyle:"italic", fontSize:22, color: p.featured ? "var(--gold)" : "var(--terracotta)"}}>{p.price}</div>
                  </div>
                  <ul style={{listStyle:"none", padding:0, margin:0, display:"grid", gap:10, flex:1}}>
                    {p.bullets.map((b,k) => (
                      <li key={k} style={{display:"flex", gap:10, fontSize:14.5, color: p.featured ? "rgba(244,239,230,0.85)" : "var(--ink-soft)"}}>
                        <Check color={p.featured ? "var(--gold)" : "var(--sage)"} /> {b}
                      </li>
                    ))}
                  </ul>
                  <a href="download.html" className="btn" style={{marginTop:32, justifyContent:"center", background: p.featured ? "var(--gold)" : "var(--ink)", color: p.featured ? "var(--ink)" : "var(--bg-elev)"}}>{p.cta} <Arrow/></a>
                </div>
              ))}
            </div>
            <p style={{textAlign:"center", marginTop:32, fontSize:14, color:"var(--ink-mute)"}}>
              Specific PKR rates are shown in-app once you're matched, based on your therapist's experience and session length. We're partnered with several insurers and corporate benefits providers — check coverage in-app.
            </p>
          </div>
          <style>{`@media (max-width: 900px) { .price-grid { grid-template-columns: 1fr !important; } }`}</style>
        </section>

        <section className="surface-cream">
          <div className="container">
            <div className="section-head"><div className="eyebrow">What's included, always</div><h2 className="h-1">Every plan, every session.</h2></div>
            <div className="grid-4">
              {[
                {t:"First session free", b:"30 minutes to meet your therapist, no card required."},
                {t:"Verified therapists", b:"Every clinician on the platform is licence-verified."},
                {t:"End-to-end encryption", b:"Sessions, notes, and messages — encrypted by default."},
                {t:"Switch therapists freely", b:"Re-matched within 24 hours, history under your control."},
              ].map((f,i) => (
                <div key={i}>
                  <div style={{width:40, height:40, borderRadius:10, background:["var(--sage)","var(--terracotta)","var(--gold)","var(--ink)"][i], marginBottom:18}}/>
                  <h3 className="h-3" style={{fontSize:17, marginBottom:6}}>{f.t}</h3>
                  <p className="body" style={{margin:0}}>{f.b}</p>
                </div>
              ))}
            </div>
          </div>
        </section>

        <FaqSection limit={4}/>
        <CTABlock title="Try TrueMind free for 30 minutes." sub="Book your first session — no card, no commitment." />
      </Page>
    );
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
