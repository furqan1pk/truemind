<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Download · TrueMind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600;700&family=Fraunces:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Noto+Nastaliq+Urdu:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script type="text/babel" src="logo.jsx"></script>
  <script type="text/babel" src="content.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="page-shell.jsx"></script>
  <script type="text/babel" src="home-hero.jsx"></script>
  <script type="text/babel" src="home-sections.jsx"></script>

  <script type="text/babel" data-presets="react">
    const App = () => (
      <Page current="patients">
        <section style={{paddingTop:80, paddingBottom:80}}>
          <div className="container">
            <div style={{display:"grid", gridTemplateColumns:"1.1fr 1fr", gap:64, alignItems:"center"}} className="dl-page">
              <div>
                <div className="chip" style={{marginBottom:24}}><span className="dot"/> Available now</div>
                <h1 className="h-display">
                  Get TrueMind. <span className="accent" style={{fontFamily:"var(--serif)",fontStyle:"italic",color:"var(--terracotta)",fontWeight:400}}>It's quietly there when you need it.</span>
                </h1>
                <p className="lede" style={{marginTop:24, maxWidth:520}}>
                  TrueMind lives entirely in our app — booking, sessions, journal, prescriptions, and follow-ups, all in one private place. No browser tabs, no awkward links.
                </p>
                <div style={{marginTop:32, display:"flex", gap:12, flexWrap:"wrap"}}>
                  <a href="#" className="store-badge"><Apple size={26}/><div><div className="small">Download on the</div><div className="big">App Store</div></div></a>
                  <a href="#" className="store-badge"><PlayStoreIcon size={26}/><div><div className="small">Get it on</div><div className="big">Google Play</div></div></a>
                </div>
                <div style={{marginTop:32, display:"flex", gap:24, flexWrap:"wrap", fontSize:14, color:"var(--ink-soft)"}}>
                  <span style={{display:"flex", alignItems:"center", gap:6}}><Star color="var(--terracotta)" size={14}/> 4.8 · App Store</span>
                  <span style={{display:"flex", alignItems:"center", gap:6}}><Star color="var(--terracotta)" size={14}/> 4.7 · Google Play</span>
                  <span style={{display:"flex", alignItems:"center", gap:6}}><ShieldIcon size={14}/> End-to-end encrypted</span>
                </div>

                {/* QR */}
                <div style={{marginTop:40, padding:20, background:"var(--bg-elev)", border:"1px solid var(--line-soft)", borderRadius:16, display:"inline-flex", alignItems:"center", gap:20}}>
                  <div style={{width:88, height:88, background:"var(--ink)", borderRadius:8, position:"relative", padding:8}}>
                    <div style={{width:"100%", height:"100%", background:"repeating-conic-gradient(var(--bg-elev) 0% 25%, var(--ink) 0% 50%) 50% / 12px 12px"}}/>
                    <div style={{position:"absolute", top:6, left:6, width:18, height:18, border:"3px solid var(--bg-elev)"}}/>
                    <div style={{position:"absolute", top:6, right:6, width:18, height:18, border:"3px solid var(--bg-elev)"}}/>
                    <div style={{position:"absolute", bottom:6, left:6, width:18, height:18, border:"3px solid var(--bg-elev)"}}/>
                  </div>
                  <div>
                    <div style={{fontSize:13, color:"var(--ink-mute)", letterSpacing:"0.06em", textTransform:"uppercase"}}>On your phone?</div>
                    <div style={{fontSize:16, fontWeight:500, marginTop:4}}>Scan to download</div>
                    <div style={{fontSize:13, color:"var(--ink-soft)", marginTop:2}}>Works on iOS 15+ and Android 9+</div>
                  </div>
                </div>
              </div>

              <div style={{display:"grid", placeItems:"center", position:"relative"}}>
                <div className="breath" style={{position:"absolute", width:380, height:380, borderRadius:"50%", background:"var(--terracotta)", opacity:0.12, filter:"blur(20px)"}}/>
                <PhonePreview/>
              </div>
            </div>
          </div>
          <style>{`@media (max-width: 900px) { .dl-page { grid-template-columns: 1fr !important; } }`}</style>
        </section>

        <section className="surface-cream">
          <div className="container">
            <div className="section-head"><div className="eyebrow">In the app</div><h2 className="h-1" style={{maxWidth:680}}>Everything you need. Nothing you don't.</h2></div>
            <div className="grid-3">
              {[
                {t:"Match in minutes", b:"Tell us what you need; meet your therapist within a day."},
                {t:"Encrypted sessions", b:"Video, audio, or chat. End-to-end encrypted, every time."},
                {t:"Private journal", b:"Note moods, patterns, and questions for next session."},
                {t:"Reminders that respect you", b:"Gentle nudges. No spam. Tweak anytime."},
                {t:"Prescriptions, when needed", b:"Through partner physicians, delivered to you in-app."},
                {t:"Insurance & employer billing", b:"Coverage tool checks your plan in seconds."},
              ].map((f,i) => (
                <div key={i}>
                  <div style={{width:36, height:36, borderRadius:10, background:["var(--sage)","var(--terracotta)","var(--gold)","var(--sage-soft)","var(--ink)","var(--sage-deep)"][i], marginBottom:18}}/>
                  <h3 className="h-3" style={{fontSize:17, marginBottom:6}}>{f.t}</h3>
                  <p className="body" style={{margin:0}}>{f.b}</p>
                </div>
              ))}
            </div>
          </div>
        </section>

        <CTABlock title="Your first session is free." sub="No card. No commitment. Just open the app."/>
      </Page>
    );
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
