<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TrueMind — Modern direction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600;700;800&family=Fraunces:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Noto+Nastaliq+Urdu:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="styles-modern.css"/>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script type="text/babel" src="logo.jsx"></script>
  <script type="text/babel" src="content.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="page-shell.jsx"></script>
  <script type="text/babel" src="home-hero.jsx"></script>
  <script type="text/babel" src="home-sections.jsx"></script>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    const ModernHero = ({ lang }) => {
      const c = (COPY[lang] || COPY.en).hero;
      const isUr = lang === "ur";
      return (
        <section style={{paddingTop:"clamp(64px, 7vw, 96px)", paddingBottom:0}}>
          <div className="container">
            <div className="chip" style={{marginBottom:32}}><span className="dot"/> {c.eyebrow}</div>
            <div style={{display:"grid", gridTemplateColumns:"1.7fr 1fr", gap:48, alignItems:"end"}} className="m-hero-grid">
              <h1 className="h-display" style={{fontSize:"clamp(56px, 8vw, 128px)", lineHeight:0.95, fontWeight:700}}>
                {isUr ? <>ذہنی صحت،<br/><span className="accent">بغیر انتظار کے۔</span></> : <>Mental health<br/>care, <span className="accent">without<br/>the wait.</span></>}
              </h1>
              <div>
                <p className="lede" style={{maxWidth:380}}>{c.lede}</p>
                <div style={{marginTop:24, display:"flex", gap:10, flexWrap:"wrap"}}>
                  <a href="download.html" className="btn btn-primary">{c.ctaPrimary} <Arrow/></a>
                  <a href="for-therapists.html" className="btn btn-ghost">{c.ctaSecondary}</a>
                </div>
              </div>
            </div>

            {/* Bento grid */}
            <div style={{display:"grid", gridTemplateColumns:"1.4fr 1fr 1fr", gridAutoRows:"minmax(220px, auto)", gap:14, marginTop:80}} className="bento">
              <div style={{background:"var(--sage)", color:"var(--bg-elev)", borderRadius:14, padding:32, gridRow:"span 2", display:"flex", flexDirection:"column", justifyContent:"space-between", overflow:"hidden", position:"relative"}}>
                <div>
                  <div style={{fontSize:12, letterSpacing:"0.08em", textTransform:"uppercase", opacity:0.65, marginBottom:12}}>Today</div>
                  <h3 style={{fontSize:32, fontWeight:600, letterSpacing:"-0.025em", color:"var(--bg-elev)", maxWidth:380, lineHeight:1.1}}>Match with a therapist in minutes — meet them in under a day.</h3>
                </div>
                <div style={{display:"flex", gap:32, fontSize:13, opacity:0.8}}>
                  <div><div style={{fontSize:36, fontWeight:600, color:"var(--gold)", letterSpacing:"-0.025em"}}>600+</div>verified therapists</div>
                  <div><div style={{fontSize:36, fontWeight:600, color:"var(--gold)", letterSpacing:"-0.025em"}}>40k</div>sessions delivered</div>
                </div>
                <div className="breath" style={{position:"absolute", right:-80, bottom:-80, width:240, height:240, borderRadius:"50%", border:"1px solid rgba(232,181,96,0.25)"}}/>
              </div>

              <div style={{background:"var(--bg-elev)", border:"1px solid var(--line-soft)", borderRadius:14, padding:24, display:"flex", flexDirection:"column", justifyContent:"space-between"}}>
                <div style={{fontSize:13, color:"var(--ink-mute)", letterSpacing:"0.06em", textTransform:"uppercase"}}>End-to-end</div>
                <div>
                  <ShieldIcon size={36}/>
                  <h3 style={{fontSize:22, fontWeight:600, marginTop:14, marginBottom:6}}>Encrypted, by default</h3>
                  <p className="body" style={{margin:0, fontSize:14}}>Sessions, notes, journals — encrypted in transit and at rest.</p>
                </div>
              </div>

              <div style={{background:"var(--terracotta)", borderRadius:14, padding:24, color:"var(--ink)", display:"flex", flexDirection:"column", justifyContent:"space-between"}}>
                <div style={{fontSize:13, opacity:0.7, letterSpacing:"0.06em", textTransform:"uppercase"}}>Free first session</div>
                <div>
                  <h3 style={{fontSize:22, fontWeight:600, marginBottom:6}}>30 minutes, no card</h3>
                  <p style={{margin:0, fontSize:14, opacity:0.85}}>Meet your therapist. Decide later. No commitment.</p>
                </div>
              </div>

              <div style={{background:"var(--bg-elev)", border:"1px solid var(--line-soft)", borderRadius:14, padding:24, display:"flex", flexDirection:"column", justifyContent:"space-between"}}>
                <div style={{fontSize:13, color:"var(--ink-mute)", letterSpacing:"0.06em", textTransform:"uppercase"}}>Languages</div>
                <div>
                  <div style={{display:"flex", gap:8, flexWrap:"wrap", marginTop:8}}>
                    {["English","اردو","عربي (UAE)"].map(l => (
                      <span key={l} style={{padding:"6px 12px", border:"1px solid var(--line)", borderRadius:8, fontSize:13}}>{l}</span>
                    ))}
                  </div>
                  <h3 style={{fontSize:22, fontWeight:600, marginTop:18, marginBottom:6}}>Spoken your way</h3>
                  <p className="body" style={{margin:0, fontSize:14}}>Filter therapists by language. No translating yourself.</p>
                </div>
              </div>

              <div style={{background:"var(--ink)", color:"var(--bg-elev)", borderRadius:14, padding:24, display:"flex", flexDirection:"column", justifyContent:"space-between"}}>
                <div style={{fontSize:13, opacity:0.55, letterSpacing:"0.06em", textTransform:"uppercase"}}>App rating</div>
                <div>
                  <div style={{display:"flex", gap:4, marginBottom:14}}>{[...Array(5)].map((_,i)=> <Star key={i} color="var(--gold)" size={18}/>)}</div>
                  <div style={{fontSize:48, fontWeight:600, letterSpacing:"-0.03em"}}>4.8</div>
                  <p style={{margin:"4px 0 0", fontSize:13, opacity:0.65}}>across App Store & Play</p>
                </div>
              </div>
            </div>
          </div>
          <style>{`
            @media (max-width: 900px) {
              .m-hero-grid { grid-template-columns: 1fr !important; }
              .bento { grid-template-columns: 1fr !important; }
              .bento > * { grid-row: auto !important; }
            }
          `}</style>
        </section>
      );
    };

    const App = () => {
      const [lang, setLang] = useState("en");
      return (
        <>
          <Nav lang={lang} setLang={setLang} current="home"/>
          <main>
            <ModernHero lang={lang}/>
            <ConcernsSection lang={lang}/>
            <HowSection lang={lang}/>
            <TherapistSection lang={lang}/>
            <TrustSection lang={lang}/>
            <PrivacySection lang={lang}/>
            <DownloadSection lang={lang}/>
            <FaqSection lang={lang}/>
          </main>
          <Footer lang={lang}/>
        </>
      );
    };
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
